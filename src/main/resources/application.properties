# Product Catalog API Configuration
# Spring Boot 3.x application.properties

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
spring.web.error.include-exception=false

# Application Configuration
spring.application.name=product-catalog-api

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Management/Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# Application Information
info.app.name=Product Catalog API
info.app.description=Spring MVC REST API for Product Catalog Management - Phase 2 Mini Project
info.app.version=1.0.0
info.app.phase=Phase 2: Spring MVC & Web Layer
info.build.java-version=17
info.build.spring-boot-version=3.2.0

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
# Logging Configuration
logging.level.com.example.productcatalog=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.validation=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/product-catalog-api.log
